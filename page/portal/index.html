<!doctype html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal — PAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../function/shared/css/fonts.css" />
    <link rel="stylesheet" href="../../function/portal/css/admin-base.css" />
    <link rel="stylesheet" href="../../function/portal/css/admin-nav.css" />
    <script src="../../function/portal/components/admin-nav.js"></script>
    <link rel="stylesheet" href="../../function/portal/css/admin-page.css">
    <script src="../../function/portal/components/pill-dropdown.js"></script>
    <style>
        .portal-center {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 40px);
        }

        .portal-title {
            font-size: 2rem;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.02em;
        }

        body.dark-grey .portal-title {
            color: #f3f4f6;
        }
    </style>
</head>

<body>
    <div id="adminNavContainer" data-admin-nav="home"></div>

    <div class="admin-content">
        <!-- Hamburger menu (auto-rendered, no tabs) -->
        <div class="admin-tabs-row">
            <div id="pillDropdownContainer" data-no-tabs></div>
        </div>

        <div class="portal-center">
            <h1 class="portal-title">Admin Portal</h1>
        </div>
    </div>

    <script>
        const user = sessionStorage.getItem('user');
        if (!user) window.location.href = '../home/main/pam.html';
    </script>
</body>

</html>
